<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Job Hire India – Loading</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8353804437562290"
     crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0e1a; --card: #111827; --border: #1e2d45;
  --accent: #f59e0b; --accent2: #3b82f6;
  --text: #f1f5f9; --muted: #64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow-x: hidden;
}

.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 20s linear infinite; z-index: 0;
}
@keyframes gridMove { to { transform: translateY(40px); } }

.orb1 {
  position: fixed; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, transparent 70%);
  top: -100px; right: -100px; border-radius: 50%;
  animation: pulse 6s ease-in-out infinite; z-index: 0;
}
.orb2 {
  position: fixed; width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
  bottom: -80px; left: -80px; border-radius: 50%;
  animation: pulse 8s ease-in-out infinite reverse; z-index: 0;
}
@keyframes pulse {
  0%,100% { transform: scale(1); } 50% { transform: scale(1.15); }
}

/* AD TOP */
.ad-slot {
  position: relative; z-index: 10;
  width: 100%; max-width: 520px;
  background: rgba(17,24,39,0.8);
  border: 1px dashed var(--border);
  border-radius: 10px; padding: 16px;
  text-align: center; color: var(--muted);
  font-size: 0.72rem; letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 20px;
}

/* CONTAINER */
.container {
  position: relative; z-index: 10;
  width: 100%; max-width: 480px;
  padding: 20px;
  animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(30px); }
  to   { opacity:1; transform:translateY(0); }
}

/* LOGO */
.logo { text-align: center; margin-bottom: 24px; }
.logo-text {
  font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 3px;
  background: linear-gradient(135deg, var(--accent) 0%, #fbbf24 50%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo-sub { font-size: 0.65rem; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

/* CARD */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 36px 28px;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
  background-size: 200% 100%; animation: shimmer 3s linear infinite;
}
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

.site-info {
  display: flex; align-items: center; gap: 14px;
  background: rgba(59,130,246,0.07);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 12px; padding: 14px 18px; margin-bottom: 32px;
}
.site-icon { font-size: 24px; }
.site-name { font-size: 1rem; font-weight: 600; }
.site-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 3px; }

/* COUNTDOWN */
.countdown-wrap {
  display: flex; flex-direction: column; align-items: center; margin-bottom: 28px;
}
.countdown-ring { position: relative; width: 130px; height: 130px; margin-bottom: 14px; }
.countdown-ring svg { position: absolute; top:0; left:0; transform: rotate(-90deg); }
.countdown-ring circle { fill: none; stroke-width: 6; stroke-linecap: round; }
.ring-bg { stroke: var(--border); }
.ring-fill {
  stroke: var(--accent); stroke-dasharray: 345;
  stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.5s;
}
.countdown-number {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: numPop 1s ease-in-out infinite;
}
@keyframes numPop { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
.countdown-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
.countdown-msg { font-size: 0.82rem; color: var(--muted); margin-top: 10px; text-align: center; line-height: 1.6; }

/* PROCEED BUTTON */
.btn-proceed {
  width: 100%; padding: 16px; border: none; border-radius: 12px;
  font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
  letter-spacing: 3px; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
}
.btn-proceed.locked {
  background: var(--border); color: var(--muted); cursor: not-allowed;
}
.btn-proceed.unlocked {
  background: linear-gradient(135deg, var(--accent), #fbbf24);
  color: #0a0e1a; box-shadow: 0 4px 24px rgba(245,158,11,0.4);
  animation: unlockPop 0.6s cubic-bezier(0.16,1,0.3,1);
}
@keyframes unlockPop { 0% { transform: scale(0.95); } 60% { transform: scale(1.05); } 100% { transform: scale(1); } }
.btn-proceed.unlocked:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(245,158,11,0.5); }

/* AD BOTTOM */
.ad-bottom {
  position: relative; z-index: 10;
  width: 100%; max-width: 480px;
  background: rgba(17,24,39,0.8);
  border: 1px dashed var(--border);
  border-radius: 10px; padding: 16px;
  text-align: center; color: var(--muted);
  font-size: 0.72rem; letter-spacing: 1px;
  text-transform: uppercase; margin-top: 20px;
}

.footer {
  position: relative; z-index: 10;
  text-align: center; padding: 16px;
  font-size: 0.72rem; color: var(--muted);
}
.footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb1"></div>
<div class="orb2"></div>

<!-- TOP AD -->
<div class="ad-slot">📢 Advertisement — Google AdSense will appear here</div>

<div class="container">
  <div class="logo">
    <div class="logo-text">Job Hire India</div>
    <div class="logo-sub">Find Jobs Across All 28 Indian States</div>
  </div>

  <div class="card">

    <!-- Site Info -->
    <div class="site-info">
      <div class="site-icon" id="siteIcon">🌐</div>
      <div>
        <div class="site-label">Taking you to</div>
        <div class="site-name" id="siteName">Loading...</div>
      </div>
    </div>

    <!-- Countdown -->
    <div class="countdown-wrap" id="countdownWrap">
      <div class="countdown-ring">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle class="ring-bg" cx="65" cy="65" r="55"/>
          <circle class="ring-fill" id="ringFill" cx="65" cy="65" r="55"/>
        </svg>
        <div class="countdown-number" id="countdownNum">10</div>
      </div>
      <div class="countdown-label">seconds remaining</div>
      <div class="countdown-msg">Please wait...<br/>Your job link is being prepared 🔍</div>
    </div>

    <!-- Proceed Button -->
    <button class="btn-proceed locked" id="proceedBtn" onclick="handleProceed()">
      🔒 &nbsp; PLEASE WAIT...
    </button>

  </div>
</div>

<!-- BOTTOM AD -->
<div class="ad-bottom">📢 Advertisement — Google AdSense will appear here</div>

<div class="footer">
  <a href="index.html">🏠 Home</a> &nbsp;·&nbsp; © 2025 Job Hire India
</div>

<script>
const siteIcons = {
  "indeed":"🔵","naukri":"🟠","linkedin":"💼","foundit":"🟢",
  "internshala":"🎓","freshersworld":"🌱","apna":"🤝","workindia":"🏭",
  "national career":"🏛","police":"👮","court":"⚖","health":"🏥","psc":"📋"
};
function getIcon(name) {
  const lower = name.toLowerCase();
  for (const [key, icon] of Object.entries(siteIcons)) {
    if (lower.includes(key)) return icon;
  }
  return "🌐";
}

const params   = new URLSearchParams(window.location.search);
const siteName = params.get("site") || "Job Portal";
const siteUrl  = params.get("url")  || "#";

document.getElementById("siteName").textContent = siteName;
document.getElementById("siteIcon").textContent = getIcon(siteName);

// ── COUNTDOWN
const TOTAL  = 10;
const CIRCUM = 2 * Math.PI * 55; // r=55
let remaining = TOTAL;

const ringFill   = document.getElementById("ringFill");
const numEl      = document.getElementById("countdownNum");
const proceedBtn = document.getElementById("proceedBtn");

ringFill.style.strokeDasharray  = CIRCUM;
ringFill.style.strokeDashoffset = 0;

const timer = setInterval(() => {
  remaining--;
  numEl.textContent = remaining;

  // Ring shrinks
  ringFill.style.strokeDashoffset = CIRCUM * (1 - remaining / TOTAL);

  // Color change
  if (remaining <= 3)      ringFill.style.stroke = "#ef4444";
  else if (remaining <= 6) ringFill.style.stroke = "#3b82f6";
  else                     ringFill.style.stroke = "#f59e0b";

  if (remaining <= 0) {
    clearInterval(timer);
    // Hide countdown, unlock button
    document.getElementById("countdownWrap").style.display = "none";
    proceedBtn.classList.remove("locked");
    proceedBtn.classList.add("unlocked");
    proceedBtn.innerHTML = "➜ &nbsp; PROCEED TO JOB";
  }
}, 1000);

// ── Go to page 2 with params
function handleProceed() {
  if (proceedBtn.classList.contains("locked")) return;
  const encodedSite = encodeURIComponent(siteName);
  const encodedUrl  = encodeURIComponent(siteUrl);
  window.location.href = `jobinfo.html?site=${encodedSite}&url=${encodedUrl}`;
}
</script>
</body>
</html>
